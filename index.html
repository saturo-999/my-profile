<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>saturo 🇩🇪</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --muted: rgba(232,232,240,0.4);
    --accent: #c8b8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease;
  }
  .cursor-follower {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.15s ease;
  }

  .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--o); transform: scale(1); }
  }

  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    z-index: 0;
    animation: drift 20s ease-in-out infinite alternate;
  }
  .nebula-1 { width: 600px; height: 600px; background: #4a2080; top: -200px; left: -100px; }
  .nebula-2 { width: 500px; height: 500px; background: #1a3a6a; bottom: -150px; right: -100px; animation-delay: -8s; }
  .nebula-3 { width: 400px; height: 400px; background: #3a1060; top: 40%; left: 30%; animation-delay: -4s; }
  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,20px) scale(1.05); }
  }

  .container {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  .profile {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeUp 1s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .avatar-ring {
    position: relative;
    width: 130px; height: 130px;
    margin: 0 auto 24px;
  }
  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 40%, rgba(200,184,255,0.8) 70%, rgba(150,130,255,0.4) 100%, transparent);
    animation: spin 4s linear infinite;
  }
  .avatar-ring::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, transparent 50%, rgba(100,80,255,0.3) 80%, transparent);
    animation: spin 7s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar {
    position: relative;
    z-index: 1;
    width: 130px; height: 130px;
    border-radius: 50%;
    border: 2px solid rgba(200,184,255,0.3);
    overflow: hidden;
    background: #111;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: grayscale(10%) contrast(1.05);
  }

  .name {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 700;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #ffffff 0%, #c8b8ff 50%, #8888ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .flag-emphasis {
    font-size: 28px;
    display: block;
    margin-bottom: 10px;
    animation: pulse-flag 3s ease-in-out infinite;
  }
  @keyframes pulse-flag {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(0,50,200,0.4)); }
    50% { transform: scale(1.08); filter: drop-shadow(0 0 16px rgba(0,80,255,0.6)); }
  }

  .tagline {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,184,255,0.5), transparent);
    margin: 30px auto;
    animation: fadeUp 1s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
  }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 640px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    backdrop-filter: blur(10px);
  }
  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .link-card:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: rgba(200,184,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,184,255,0.1);
  }
  .link-card:hover::before { opacity: 1; }
  .link-card:hover .icon-wrap { transform: scale(1.1) rotate(-5deg); }

  .icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .icon-wrap svg { width: 22px; height: 22px; fill: white; }

  .link-info { flex: 1; }
  .link-platform {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .link-name { font-size: 15px; font-weight: 400; color: var(--text); }
  .link-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.3s, color 0.3s;
  }
  .link-card:hover .link-arrow { transform: translateX(4px); color: white; }

  .link-card:nth-child(1) { animation-delay: 0.7s; }
  .link-card:nth-child(2) { animation-delay: 0.85s; }
  .link-card:nth-child(3) { animation-delay: 1.0s; }
  .link-card:nth-child(4) { animation-delay: 1.15s; }
  .link-card:nth-child(5) { animation-delay: 1.3s; }
  .link-card:nth-child(6) { animation-delay: 1.45s; }
  .link-card:nth-child(7) { animation-delay: 1.6s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Music player */
  .music-player {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(10,10,20,0.85);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 18px 10px 10px;
    backdrop-filter: blur(20px);
    animation: slideUp 1s ease 2s both;
    cursor: default;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .music-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .music-btn:hover { background: rgba(255,255,255,0.15); }
  .music-btn svg { width: 14px; height: 14px; fill: white; }
  .music-info { min-width: 0; }
  .music-title {
    font-size: 11px; color: var(--text);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 160px;
  }
  .music-artist { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }

  .eq {
    display: flex;
    align-items: flex-end;
    gap: 2px; height: 16px;
    flex-shrink: 0;
  }
  .eq-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: eq-anim 0.8s ease-in-out infinite alternate;
    opacity: 0.7;
  }
  .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .eq-bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
  .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.3s; }
  .eq-bar:nth-child(4) { height: 14px; animation-delay: 0.1s; }
  .eq-bar:nth-child(5) { height: 5px; animation-delay: 0.25s; }
  @keyframes eq-anim {
    from { transform: scaleY(0.3); }
    to { transform: scaleY(1); }
  }
  .eq.paused .eq-bar {
    animation-play-state: paused;
    transform: scaleY(0.3);
  }

  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: rgba(200,184,255,0.6);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: float-up var(--dur) ease-in infinite;
    animation-delay: var(--delay);
    left: var(--x);
    bottom: -10px;
  }
  @keyframes float-up {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
    50% { transform: translateY(-40vh) translateX(var(--drift)) scale(1.2); opacity: 0.4; }
    100% { transform: translateY(-100vh) translateX(calc(var(--drift) * 2)) scale(0); opacity: 0; }
  }

  .footer {
    margin-top: 50px;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.2em;
    animation: fadeUp 1s ease 2s both;
  }

  audio { display: none; }
</style>
</head>

document.getElementById('profileImg').src = 'data:image/webp;base64,' + imgB64;

// Cursor
const cursor = document.getElementById('cursor');
const follower = document.getElementById('cursorFollower');
let mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX - 4 + 'px';
  cursor.style.top = mouseY - 4 + 'px';
});
function animateFollower() {
  followerX += (mouseX - followerX) * 0.12;
  followerY += (mouseY - followerY) * 0.12;
  follower.style.left = followerX - 16 + 'px';
  follower.style.top = followerY - 16 + 'px';
  requestAnimationFrame(animateFollower);
}
animateFollower();
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform = 'scale(3)';
    follower.style.transform = 'scale(1.5)';
    follower.style.borderColor = 'rgba(200,184,255,0.6)';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.transform = 'scale(1)';
    follower.style.transform = 'scale(1)';
    follower.style.borderColor = 'rgba(255,255,255,0.3)';
  });
});

// Stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 160; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  star.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${Math.random()*4+2}s;--o:${Math.random()*0.7+0.3};animation-delay:${Math.random()*5}s;`;
  starsContainer.appendChild(star);
}

// Particles
const particlesContainer = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const drift = (Math.random() - 0.5) * 60;
  p.style.cssText = `--x:${Math.random()*100}vw;--dur:${Math.random()*8+8}s;--delay:${Math.random()*8}s;--drift:${drift}px;`;
  particlesContainer.appendChild(p);
}

// Music
const audio = document.getElementById('bgMusic');
const eq = document.getElementById('eq');
const playIcon = document.getElementById('playIcon');
const playBtn = document.getElementById('playBtn');
let playing = false;

playBtn.addEventListener('click', function() {
  if (!playing) {
    if (audio.src && audio.src !== window.location.href) {
      audio.play().then(() => {
        playing = true;
        eq.classList.remove('paused');
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      }).catch(() => showMusicNote());
    } else {
      showMusicNote();
    }
  } else {
    audio.pause();
    playing = false;
    eq.classList.add('paused');
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
});

function showMusicNote() {
  const note = document.createElement('div');
  note.style.cssText = `position:fixed;bottom:80px;right:24px;z-index:200;background:rgba(10,10,20,0.95);border:1px solid rgba(200,184,255,0.3);border-radius:12px;padding:14px 18px;max-width:260px;font-size:12px;color:rgba(232,232,240,0.8);line-height:1.6;backdrop-filter:blur(20px);`;
  note.innerHTML = `🎵 <strong style="color:#c8b8ff">Far From Any Road</strong><br><span style="opacity:0.5;font-size:11px;">The Handsome Family</span><br><br><span style="font-size:11px;opacity:0.5;">لتشغيل الأغنية، ضع ملف MP3 بجانب الموقع باسم:<br><code>far-from-any-road.mp3</code></span><div style="text-align:right;margin-top:10px;"><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:1px solid rgba(255,255,255,0.2);color:white;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:11px;">OK</button></div>`;
  document.body.appendChild(note);
  setTimeout(() => note && note.remove(), 8000);
}

// Auto-try loading mp3 if exists
audio.src = 'far-from-any-road.mp3';
audio.addEventListener('canplay', () => {
  // File exists, show visual ready state
  eq.style.opacity = '1';
});
</script>
</body>
